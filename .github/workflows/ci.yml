name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Lint (ruff)
        run: poetry run ruff check .

      - name: Format check (ruff)
        run: poetry run ruff format --check .

      - name: Type check (mypy)
        run: poetry run mypy src

      - name: Unit tests
        run: poetry run pytest -m "not integration" --cov --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

  # Single, matrix-independent check to require in branch protection: it
  # succeeds only when every `quality` matrix leg succeeded.
  all-green:
    name: all-green
    if: always()
    needs: [quality]
    runs-on: ubuntu-latest
    steps:
      - name: Require the quality matrix to have passed
        run: |
          [ "${{ needs.quality.result }}" = "success" ] || { echo "quality matrix failed"; exit 1; }
